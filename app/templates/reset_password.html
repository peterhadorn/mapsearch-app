{% extends "base.html" %}

{% block title %}Reset Password — MapSearch{% endblock %}

{% block head %}
  <link rel="stylesheet" href="/static/css/pages.css?v=9">
{% endblock %}

{% block content %}

  <div class="page-container" style="max-width:400px;">

    <div class="page-header" style="text-align:center;">
      <h1 data-i18n="resetPassword.title">Reset Password</h1>
      <p data-i18n="resetPassword.subtitle">Enter your new password</p>
    </div>

    <div id="alert-container"></div>

    <div class="card">
      <form id="reset-password-form" novalidate>
        <div class="form-group">
          <label for="new-password" data-i18n="resetPassword.newPassword">New Password</label>
          <input type="password" id="new-password" name="new_password" autocomplete="new-password" required>
        </div>
        <div class="form-group">
          <label for="confirm-password" data-i18n="resetPassword.confirmPassword">Confirm Password</label>
          <input type="password" id="confirm-password" name="confirm_password" autocomplete="new-password" required>
        </div>
        <div class="form-actions">
          <button type="submit" class="btn-primary" style="width:100%;" data-i18n="resetPassword.submitBtn">Set New Password</button>
        </div>
      </form>
    </div>

    <p style="text-align:center;margin-top:var(--space-4);">
      <a href="/" data-i18n="resetPassword.backToHome">Back to MapSearch</a>
    </p>

  </div>

{% endblock %}

{% block scripts %}
<script>
(function () {
  const params = new URLSearchParams(window.location.search);
  const token = params.get('token');

  const alertContainer = document.getElementById('alert-container');
  const form = document.getElementById('reset-password-form');

  function showAlert(message, type) {
    alertContainer.innerHTML = `<div class="alert alert-${type}">${message}</div>`;
  }

  if (!token) {
    showAlert('Invalid or missing reset token. Please request a new password reset link.', 'error');
    form.style.display = 'none';
    return;
  }

  form.addEventListener('submit', async function (e) {
    e.preventDefault();

    const newPassword = document.getElementById('new-password').value;
    const confirmPassword = document.getElementById('confirm-password').value;

    if (newPassword !== confirmPassword) {
      showAlert('Passwords do not match. Please try again.', 'error');
      return;
    }

    if (newPassword.length < 8) {
      showAlert('Password must be at least 8 characters.', 'error');
      return;
    }

    try {
      const res = await fetch('/api/auth/reset-password', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ token, new_password: newPassword }),
      });

      const data = await res.json().catch(() => ({}));

      if (res.ok) {
        showAlert('Your password has been reset. You can now <a href="/">sign in</a>.', 'success');
        form.style.display = 'none';
      } else {
        showAlert(data.detail || 'Failed to reset password. The link may have expired.', 'error');
      }
    } catch (err) {
      showAlert('Something went wrong. Please try again.', 'error');
    }
  });
})();
</script>
{% endblock %}
