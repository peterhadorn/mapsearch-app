{% extends "base.html" %}

{% block title %}Reset Password — MapSearch{% endblock %}

{% block head %}
  <link rel="stylesheet" href="/static/css/pages.css?v=11">
{% endblock %}

{% block content %}

  <header class="header--glass">
    <a href="/" class="header__logo">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
        <circle cx="11" cy="11" r="8"/>
        <line x1="21" y1="21" x2="16.65" y2="16.65"/>
      </svg>
      MapSearch
    </a>
    <div class="header__actions">
      <button class="theme-toggle" id="theme-toggle" type="button" aria-label="Toggle theme" title="Toggle theme">
        <svg class="theme-icon--light" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/></svg>
        <svg class="theme-icon--dark" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
      </button>
    </div>
  </header>

  <div class="page-container" style="max-width:400px;">

    <div class="page-header" style="text-align:center;">
      <h1 data-i18n="resetPassword.title">Reset Password</h1>
      <p data-i18n="resetPassword.subtitle">Enter your new password</p>
    </div>

    <div id="alert-container"></div>

    <div class="card">
      <form id="reset-password-form" novalidate>
        <div class="form-group">
          <label for="new-password" data-i18n="resetPassword.newPassword">New Password</label>
          <input type="password" id="new-password" name="new_password" autocomplete="new-password" required>
        </div>
        <div class="form-group">
          <label for="confirm-password" data-i18n="resetPassword.confirmPassword">Confirm Password</label>
          <input type="password" id="confirm-password" name="confirm_password" autocomplete="new-password" required>
        </div>
        <div class="form-actions">
          <button type="submit" class="btn-primary" style="width:100%;" data-i18n="resetPassword.submitBtn">Set New Password</button>
        </div>
      </form>
    </div>

    <p style="text-align:center;margin-top:var(--space-4);">
      <a href="/" data-i18n="resetPassword.backToHome">Back to MapSearch</a>
    </p>

  </div>

{% endblock %}

{% block scripts %}
<script>
(function () {
  const params = new URLSearchParams(window.location.search);
  const token = params.get('token');

  const alertContainer = document.getElementById('alert-container');
  const form = document.getElementById('reset-password-form');

  function showAlert(message, type) {
    alertContainer.innerHTML = `<div class="alert alert-${type}">${message}</div>`;
  }

  I18n.ready().then(() => {
    if (!token) {
      showAlert(I18n.get('resetPassword.invalidLink') || 'Invalid or missing reset token. Please request a new password reset link.', 'error');
      form.style.display = 'none';
      return;
    }

    form.addEventListener('submit', async function (e) {
      e.preventDefault();

      const newPassword = document.getElementById('new-password').value;
      const confirmPassword = document.getElementById('confirm-password').value;

      if (newPassword !== confirmPassword) {
        showAlert(I18n.get('resetPassword.passwordMismatch') || 'Passwords do not match. Please try again.', 'error');
        return;
      }

      if (newPassword.length < 8) {
        showAlert(I18n.get('resetPassword.passwordTooShort') || 'Password must be at least 8 characters.', 'error');
        return;
      }

      try {
        const res = await fetch('/api/auth/reset-password', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ token, new_password: newPassword }),
        });

        const data = await res.json().catch(() => ({}));

        if (res.ok) {
          showAlert(I18n.get('resetPassword.successWithLink') || 'Your password has been reset. You can now <a href="/">sign in</a>.', 'success');
          form.style.display = 'none';
        } else {
          showAlert(data.detail || I18n.get('resetPassword.expired') || 'Failed to reset password. The link may have expired.', 'error');
        }
      } catch (err) {
        showAlert(I18n.get('resetPassword.networkError') || 'Something went wrong. Please try again.', 'error');
      }
    });
  });
})();
</script>
{% endblock %}
